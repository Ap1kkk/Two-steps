name: Deploy backend to VPS

on:
  push:
    branches:
      - main
    paths:
      - "**/backend/**"
  workflow_dispatch:

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME_BACKEND: ap1k/two-steps-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate tag with date and commit hash
        id: vars
        run: |
          DATE=$(date +'%Y%m%d')
          SHORT_HASH=$(git rev-parse --short=4 HEAD)
          TAG="${DATE}-${{ github.run_number }}-${SHORT_HASH}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ steps.vars.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/Two-steps
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f