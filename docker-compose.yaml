x-project-name:
  &project-name sportline

x-host:
  &host localhost
x-protocol:
  &protocol http

x-profiles:
  &profiles dev, in-docker

services:
  backend:
    build:
      context: backend/business
      dockerfile: Dockerfile
    container_name: sportline_backend_business
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SERVER_HOST: *host
      SERVER_PROTOCOL: *protocol

      SPRING_PROFILES_ACTIVE: *profiles

      #     Database
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DATABASE_HOST: postgres
      SPRING_DATASOURCE_DATABASE_PORT: 5432
      SPRING_DATASOURCE_DATABASE_NAME: ${POSTGRES_DB}

      SECURITY_CORS_ALLOWED_ORIGIN: "*"

      MVC_RESOURCE_PATH_PATTERN: "/static/image/**"

    volumes:
      - ./uploads:/routes/uploads

  postgres:
    restart: always
    image: postgres:14.8-alpine3.18
    container_name: sportline_postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
#    volumes:
#      - ./postgres-data:/var/lib/postgresql/data

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: sportline_frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
