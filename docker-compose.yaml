version: '3.8'

services:
  # ==================== БЭКЕНД ====================
  backend:
    image: ap1k/two-steps-backend:latest
    container_name: two-steps-backend
    depends_on:
      - postgres
      - victoriametrics  # Ждем готовности баз
      - loki
    environment:
      SERVER_HOST: ${SERVER_HOST}
      SERVER_PROTOCOL: ${SERVER_PROTOCOL}
      SPRING_PROFILES_ACTIVE: ${BACKEND_PROFILES}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DATABASE_HOST: postgres
      SPRING_DATASOURCE_DATABASE_PORT: 5432
      SPRING_DATASOURCE_DATABASE_NAME: ${POSTGRES_DB}
      SECURITY_CORS_ALLOWED_ORIGIN: "*"
      MVC_RESOURCE_PATH_PATTERN: "/static/image/**"

      # --- Метрики для VictoriaMetrics (через push) ---
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
      # Шлем метрики прямо в vmagent (который отправит в VictoriaMetrics)
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_PUSHGATEWAY_ENABLED: "true"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_PUSHGATEWAY_BASEURL: "http://vmagent:8429"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_PUSHGATEWAY_JOB: "two-steps-backend"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_PUSHGATEWAY_PUSH_RATE: "10s"

      # --- Логи в формате JSON (чтобы Loki понимал) ---
      LOGGING_FILE_NAME: /var/log/backend/application.log
      LOGGING_PATTERN_CONSOLE: "{\"timestamp\":\"%d{ISO8601}\",\"level\":\"%p\",\"thread\":\"%t\",\"class\":\"%c{40}\",\"message\":\"%m\",\"exception\":\"%wEx\"}%n"
      LOGGING_LEVEL_ROOT: "INFO"
    volumes:
      - ./uploads:/routes/uploads
      - ./logs:/var/log/backend
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ==================== БАЗА ДАННЫХ ====================
  postgres:
    image: postgres:14.8-alpine3.18
    container_name: two-steps-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"

  # ==================== ФРОНТЕНД ====================
  frontend:
    image: ap1k/two-steps-frontend:latest
    container_name: two-steps-frontend
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx:/etc/nginx/conf.d
    restart: unless-stopped

  # ================ ЛОГИ (Loki + Vector) ================

  vector:
    image: timberio/vector:0.42.0-alpine
    container_name: two-steps-vector
    volumes:
      - ./logs:/var/log/backend:ro   # Монтируем папку с логами (только чтение)
      - ./infra/vector.yaml:/etc/vector/vector.yaml:ro  # Конфиг
    command: ["--config", "/etc/vector/vector.yaml"]
    depends_on:
      - loki
    restart: unless-stopped

  # 2. База для логов (легковесная альтернатива Elasticsearch)
  loki:
    image: grafana/loki:2.9.4
    container_name: two-steps-loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./infra/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - ./loki-data:/loki  # Персистентные данные
    ports:
      - "3100:3100"  # Порт для запросов из Grafana
    restart: unless-stopped

  # ================ МЕТРИКИ (VictoriaMetrics + vmagent) ================

  # 1. Агент для сбора метрик (кушает push от Spring и тянет метрики)
  vmagent:
    image: victoriametrics/vmagent:latest
    container_name: two-steps-vmagent
    volumes:
      - ./infra/vmagent-config.yaml:/etc/vmagent/config.yaml:ro
    command:
      - '-promscrape.config=/etc/vmagent/config.yaml'
      - '-remoteWrite.url=http://victoriametrics:8428/api/v1/write'
      - '-remoteWrite.retryMaxInterval=10s'
      - '-remoteWrite.maxDiskUsagePerURL=500MB'   # лимит буфера на диске
    ports:
      - "8429:8429"
    depends_on:
      - victoriametrics
    restart: unless-stopped

  # 2. База для метрик (эффективная замена Prometheus)
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: two-steps-victoriametrics
    volumes:
      - ./victoria-metrics-data:/victoria-metrics-data
    command:
      - '-storageDataPath=/victoria-metrics-data'
      - '-retentionPeriod=1'  # Храним метрики 1 месяц
    ports:
      - "8428:8428"  # Порт для запросов
    restart: unless-stopped

  # ================ ВИЗУАЛИЗАЦИЯ (Grafana) ================

  grafana:
    image: grafana/grafana:latest
    container_name: two-steps-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Пароль по умолчанию
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - victoriametrics
    restart: unless-stopped