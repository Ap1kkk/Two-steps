sources:
  application_logs:
    type: file
    include:
      - /var/log/backend/*.log
    read_from: beginning

transforms:
  parse_json:
    type: remap
    inputs: ["application_logs"]
    source: |
      parsed = parse_json(.message) ?? {}
      if !is_empty(parsed) {
        . = merge(., parsed)
      }

sinks:
  to_loki:
    type: loki
    inputs: ["parse_json"]
    endpoint: http://loki:3100
    encoding:
      codec: json
    labels:
      job: "backend"
      container: "two-steps-backend"