scrape_configs:
  - job_name: 'spring-boot-push'
    scrape_interval: 10s
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8429']

  # Служебные метрики vmagent
  - job_name: 'vmagent'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:8429']